<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ML/AI Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/app.css" />
  </head>
  <body>
    <div id="app">

      <!-- TOP BAR -->
      <header class="topbar">
        <div class="topbar-brand">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
          </svg>
          <span>ML Playground</span>
        </div>

        <div class="topbar-center">
          <div class="epoch-counter">
            <span class="epoch-label">Epoch</span>
            <span id="epoch-display" class="epoch-value">—</span>
          </div>
        </div>

        <div class="topbar-right">
          <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="1" max="60" value="8" class="speed-slider" />
            <span id="speed-val" class="speed-val">8<small>/s</small></span>
          </div>
          <div class="topbar-buttons">
            <button id="start-btn" class="btn btn-run">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Run
            </button>
            <button id="pause-btn" class="btn btn-pause">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              Pause
            </button>
            <button id="reset-btn" class="btn btn-reset">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
              Reset
            </button>
          </div>
          <button id="dark-toggle" class="btn btn-icon" title="Toggle dark mode">
            <svg id="dark-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <div id="status-badge" class="status-badge">Ready</div>
        </div>
      </header>

      <!-- WORKSPACE: 3-column -->
      <div class="workspace">

        <!-- LEFT: Algorithm selector + Data + Params -->
        <aside class="panel-left" id="controls">
          <div class="panel-section">
            <div class="section-label">Algorithm</div>
            <div id="algo-selector-box"></div>
          </div>
          <div class="panel-section">
            <div class="section-label">Data</div>
            <div id="data-param-box"></div>
          </div>
          <div class="panel-section">
            <div class="section-label">Hyperparameters</div>
            <div id="param-box"></div>
          </div>
          <div class="panel-section">
            <div class="algo-info-header" id="algo-info-toggle">
              <span class="section-label" style="margin-bottom:0">How it works</span>
              <svg class="algo-info-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div id="algo-info-box"></div>
          </div>
        </aside>

        <!-- CENTER: Visualization -->
        <main class="panel-center">
          <div id="simulation-root" class="simulation-root"></div>
        </main>

        <!-- RIGHT: Metrics -->
        <aside class="panel-right">
          <div class="section-label">Metrics</div>
          <div id="metrics"></div>
        </aside>

      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
